<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CrewLoop - Dispatch Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F6F4EE;
    --panel:#FBFAF6;
    --ink:#161410;
    --ink-2:#3A372F;
    --muted:#7A766C;
    --line:rgba(22,20,16,.12);
    --line-2:rgba(22,20,16,.07);
    --green:#2F6F4E;
    --green-soft:#E6EFE5;
    --red:#B94731;
    --red-soft:#F5E3DC;
    --amber:#9A6A18;
    --amber-soft:#F1E7D0;
    --blue:#315B7A;
    --blue-soft:#E1EBF1;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Geist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  button{font:inherit}
  .mono{font-family:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace}
  .topbar{
    height:62px;display:flex;align-items:center;justify-content:space-between;gap:18px;
    padding:0 26px;border-bottom:1px solid var(--line);
    background:rgba(246,244,238,.88);position:sticky;top:0;z-index:5;backdrop-filter:blur(12px);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700}
  .mark{width:24px;height:24px;border-radius:7px;background:var(--ink);display:grid;place-items:center;color:#fff;font-size:13px}
  .nav{display:flex;align-items:center;gap:16px;color:var(--muted);font-size:13px}
  .nav a{text-decoration:none}
  .shell{max-width:1440px;margin:0 auto;padding:26px}
  .header{
    display:grid;grid-template-columns:minmax(0,1fr) auto;gap:20px;align-items:end;margin-bottom:18px;
  }
  h1{
    font-family:"Instrument Serif", Georgia, serif;font-size:42px;line-height:1;margin:0 0 8px;
    font-weight:400;letter-spacing:-.02em;
  }
  .sub{color:var(--muted);margin:0;max-width:72ch}
  .status-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
  .chip{
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
    font:500 11px/1 "Geist Mono", ui-monospace, monospace;text-transform:uppercase;letter-spacing:.08em;
    border-radius:999px;padding:7px 9px;background:#ECE7DC;color:var(--muted);
  }
  .chip.green{background:var(--green-soft);color:var(--green)}
  .chip.red{background:var(--red-soft);color:var(--red)}
  .chip.amber{background:var(--amber-soft);color:var(--amber)}
  .chip.blue{background:var(--blue-soft);color:var(--blue)}

  .grid{
    display:grid;
    grid-template-columns:minmax(320px,1.05fr) minmax(340px,1.25fr) minmax(300px,.9fr);
    gap:14px;align-items:start;
  }
  .stack{display:grid;gap:14px}
  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;
    box-shadow:0 1px 0 rgba(22,20,16,.02), 0 18px 50px -36px rgba(22,20,16,.22);
  }
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 16px;border-bottom:1px solid var(--line-2);
  }
  .panel-head h2{margin:0;font-size:14px;font-weight:700}
  .panel-body{padding:16px}
  .field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));border-top:1px solid var(--line-2);border-left:1px solid var(--line-2)}
  .field{padding:13px 14px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);min-width:0}
  .label{font:500 10.5px/1 "Geist Mono", ui-monospace, monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
  .value{font-size:15px;font-weight:700;color:var(--ink);overflow-wrap:anywhere}
  .description{margin-top:12px;color:var(--ink-2)}

  .contractors{display:grid}
  .contractor{
    display:grid;grid-template-columns:40px minmax(0,1fr) auto;gap:12px;align-items:center;
    padding:13px 16px;border-bottom:1px solid var(--line-2);
  }
  .contractor:last-child{border-bottom:0}
  .avatar{width:40px;height:40px;border-radius:999px;background:#E8E1D4;color:#514A3E;display:grid;place-items:center;font-weight:800;font-size:13px}
  .contractor.recommended{background:linear-gradient(0deg, rgba(47,111,78,.08), rgba(47,111,78,.08))}
  .contractor-main{min-width:0}
  .contractor-name{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:800}
  .contractor-meta{color:var(--muted);font-size:12.5px;margin-top:4px;overflow-wrap:anywhere}
  .score{font:700 18px/1 "Geist Mono", ui-monospace, monospace;text-align:right}
  .score span{display:block;font-size:10px;color:var(--muted);font-weight:500;margin-top:4px;text-transform:uppercase;letter-spacing:.08em}

  .timeline{padding:8px 16px 14px}
  .event{display:grid;grid-template-columns:24px minmax(0,1fr) auto;gap:10px;padding:11px 0;border-bottom:1px solid var(--line-2)}
  .event:last-child{border-bottom:0}
  .node{width:10px;height:10px;border-radius:999px;margin:5px auto 0;background:#BDB5A7}
  .event.complete .node{background:var(--green)}
  .event.ready .node{background:var(--blue)}
  .event.pending .node{background:var(--amber)}
  .event.blocked .node{background:var(--red)}
  .event-title{font-weight:800}
  .event-detail{color:var(--muted);font-size:12.5px;margin-top:3px;overflow-wrap:anywhere}
  .event-time{font:500 11px/1 "Geist Mono", ui-monospace, monospace;color:var(--muted);white-space:nowrap;margin-top:4px}

  .conditions,.proof-list,.summary-list{display:grid;gap:10px}
  .condition,.proof-item,.summary-item{
    display:grid;grid-template-columns:22px minmax(0,1fr);gap:10px;align-items:start;
    padding:10px 0;border-bottom:1px solid var(--line-2);
  }
  .condition:last-child,.proof-item:last-child,.summary-item:last-child{border-bottom:0}
  .check{
    width:18px;height:18px;border-radius:6px;border:1px solid var(--line);display:grid;place-items:center;margin-top:1px;color:var(--muted);
  }
  .condition.done .check{background:var(--green);border-color:var(--green);color:#fff}
  .item-title{font-weight:800}
  .item-detail{color:var(--muted);font-size:12.5px;margin-top:2px}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .btn{
    border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:white;color:var(--ink);
    display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:800;min-height:40px;
  }
  .btn.primary{background:var(--ink);border-color:var(--ink);color:white}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .source-shot{padding:12px;border-top:1px solid var(--line-2)}
  .source-shot img{width:100%;border:1px solid var(--line);border-radius:8px;background:white;display:block}
  .source-meta{display:grid;gap:9px;padding:14px 16px;color:var(--muted);font-size:12.5px}
  .source-meta a{color:var(--ink);overflow-wrap:anywhere}
  .summary-message{font-size:16px;font-weight:700;line-height:1.35;color:var(--ink);margin:0 0 12px}
  .empty{padding:42px 18px;color:var(--muted);text-align:center}
  .error{background:var(--red-soft);border:1px solid rgba(185,71,49,.24);color:var(--red);border-radius:8px;padding:14px 16px}

  @media (max-width:1120px){
    .grid{grid-template-columns:1fr 1fr}
    .stack.side{grid-column:1 / -1;grid-template-columns:repeat(3,minmax(0,1fr))}
  }
  @media (max-width:820px){
    .topbar{padding:0 18px}
    .nav{display:none}
    .shell{padding:20px 16px 34px}
    .header{grid-template-columns:1fr}
    .status-row{justify-content:flex-start}
    h1{font-size:34px}
    .grid,.stack.side{grid-template-columns:1fr}
    .field-grid{grid-template-columns:1fr}
    .actions{grid-template-columns:1fr}
    .contractor{grid-template-columns:36px minmax(0,1fr)}
    .score{grid-column:2;text-align:left;font-size:14px}
    .score span{display:inline;margin-left:6px}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="mark">C</span> CrewLoop <span class="mono" style="color:var(--muted);font-size:12px">Dispatch Room</span></div>
  <nav class="nav">
    <a href="/browser-import">Browser Import</a>
    <a href="/bay-events/staffing" target="_blank">Bay Events</a>
    <a href="/dashboard">Dashboard</a>
  </nav>
</div>

<main class="shell">
  <section class="header">
    <div>
      <h1 id="title">Dispatch Room</h1>
      <p id="subtitle" class="sub">Loading dispatch state…</p>
    </div>
    <div id="status-row" class="status-row"></div>
  </section>
  <div id="root" class="empty">Loading…</div>
</main>

<script>
  const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
  const money = (v) => `$${Number(v || 0).toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
  const jobId = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop() || "");

  load();

  async function load() {
    try {
      const response = await fetch(`/api/dispatch/${encodeURIComponent(jobId)}`);
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.detail || "Dispatch room unavailable");
      render(payload);
    } catch (error) {
      document.getElementById("root").className = "error";
      document.getElementById("root").textContent = error.message;
    }
  }

  function render(data) {
    const { job, contractors, timeline, payment, proof, owner_summary, web_source } = data;
    const recommended = contractors[0];
    document.getElementById("title").textContent = `${cap(job.role)} shift`;
    document.getElementById("subtitle").textContent = `${job.business_name} · ${job.location} · ${job.start_time} - ${job.end_time}`;
    document.getElementById("status-row").innerHTML = `
      <span class="chip red">${esc(job.urgency)}</span>
      <span class="chip blue">${esc(job.status)}</span>
      <span class="chip green">${recommended ? esc(recommended.name) : "No match"}</span>
      <span class="chip amber">${money(job.pay_amount)}</span>
    `;

    document.getElementById("root").className = "grid";
    document.getElementById("root").innerHTML = `
      <section class="stack">
        ${jobCard(job)}
        ${contractorCard(contractors)}
        ${webSourceCard(web_source)}
      </section>
      <section class="stack">
        ${timelineCard(timeline)}
      </section>
      <section class="stack side">
        ${paymentCard(payment)}
        ${proofCard(proof)}
        ${ownerSummaryCard(owner_summary)}
      </section>
    `;
  }

  function jobCard(job) {
    return `
      <article class="panel">
        <div class="panel-head">
          <h2>Job Request</h2>
          <span class="chip red">${esc(job.urgency)}</span>
        </div>
        <div class="field-grid">
          ${field("Role", cap(job.role))}
          ${field("Time", `${job.start_time} - ${job.end_time}`)}
          ${field("Location", job.location)}
          ${field("Pay", money(job.pay_amount))}
          ${field("Required skills", (job.required_skills || []).join(", "))}
          ${field("Status", job.status)}
        </div>
        ${job.description ? `<div class="panel-body description">${esc(job.description)}</div>` : ""}
      </article>
    `;
  }

  function contractorCard(contractors) {
    return `
      <article class="panel">
        <div class="panel-head">
          <h2>Contractor Match List</h2>
          <span class="chip green">${contractors.length} ranked</span>
        </div>
        <div class="contractors">
          ${contractors.map((person) => `
            <div class="contractor ${person.status === "recommended" ? "recommended" : ""}">
              <div class="avatar">${esc(person.initials)}</div>
              <div class="contractor-main">
                <div class="contractor-name">
                  ${esc(person.name)}
                  <span class="chip ${statusColor(person.status)}">${esc(person.status)}</span>
                </div>
                <div class="contractor-meta">
                  ${esc(person.skills.join(", "))} · ${person.distance_miles} mi · ${person.reliability_score}% reliability · ${esc(person.response_speed)}
                </div>
              </div>
              <div class="score">${person.match_score}<span>match</span></div>
            </div>
          `).join("")}
        </div>
      </article>
    `;
  }

  function timelineCard(timeline) {
    return `
      <article class="panel">
        <div class="panel-head">
          <h2>Live Timeline</h2>
          <span class="chip blue">stream ready</span>
        </div>
        <div class="timeline">
          ${timeline.map((event) => `
            <div class="event ${esc(event.status)}">
              <span class="node"></span>
              <div>
                <div class="event-title">${esc(event.label)}</div>
                <div class="event-detail">${esc(event.detail)}</div>
              </div>
              <div class="event-time">${esc(event.time)}</div>
            </div>
          `).join("")}
        </div>
      </article>
    `;
  }

  function paymentCard(payment) {
    return `
      <article class="panel">
        <div class="panel-head">
          <h2>Payment Panel</h2>
          <span class="chip amber">${esc(payment.status)}</span>
        </div>
        <div class="panel-body">
          <div class="field-grid" style="border-bottom:1px solid var(--line-2);margin:-16px -16px 14px">
            ${field("Amount", money(payment.amount))}
            ${field("Provider", payment.provider)}
          </div>
          <div class="conditions">
            ${payment.release_conditions.map((item) => `
              <div class="condition ${item.complete ? "done" : ""}">
                <span class="check">${item.complete ? checkIcon() : ""}</span>
                <div class="item-title">${esc(item.label)}</div>
              </div>
            `).join("")}
          </div>
          <div class="actions">
            <button class="btn primary">
              ${sendIcon()} Hold payment
            </button>
            <button class="btn" disabled>
              ${checkIcon()} Approve release
            </button>
          </div>
        </div>
      </article>
    `;
  }

  function proofCard(proof) {
    return `
      <article class="panel">
        <div class="panel-head">
          <h2>Proof Panel</h2>
          <span class="chip amber">${esc(proof.status)}</span>
        </div>
        <div class="panel-body proof-list">
          ${proof.items.map((item) => `
            <div class="proof-item">
              <span class="check"></span>
              <div>
                <div class="item-title">${esc(item.type)}</div>
                <div class="item-detail">${esc(item.status)} · ${esc(item.detail)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </article>
    `;
  }

  function ownerSummaryCard(summary) {
    return `
      <article class="panel">
        <div class="panel-head">
          <h2>Owner Summary</h2>
          <span class="chip blue">${esc(summary.business_name)}</span>
        </div>
        <div class="panel-body">
          <p class="summary-message">${esc(summary.message)}</p>
          <div class="summary-list">
            ${summaryItem("Confirmed contractor", summary.confirmed_contractor)}
            ${summaryItem("ETA", summary.eta)}
            ${summaryItem("Pay", money(summary.pay))}
            ${summaryItem("Proof", summary.proof)}
            ${summaryItem("Payment", summary.payment_status)}
          </div>
        </div>
      </article>
    `;
  }

  function webSourceCard(source) {
    if (!source) {
      return `
        <article class="panel">
          <div class="panel-head"><h2>Web Source Panel</h2><span class="chip amber">none</span></div>
          <div class="empty">No browser source attached.</div>
        </article>
      `;
    }
    return `
      <article class="panel">
        <div class="panel-head">
          <h2>Web Source Panel</h2>
          <span class="chip green">${Math.round((source.extraction_confidence || 0) * 100)}%</span>
        </div>
        <div class="source-meta">
          <div><span class="mono">source</span> <a href="${esc(source.source_url)}" target="_blank">${esc(source.source_url)}</a></div>
          <div><span class="mono">type</span> ${esc(source.source_type)}</div>
          <div><span class="mono">update</span> ${esc(source.update_status)}</div>
          ${source.source_html_url ? `<div><span class="mono">snapshot</span> <a href="${esc(source.source_html_url)}" target="_blank">HTML captured</a></div>` : ""}
        </div>
        ${source.screenshot_url ? `<div class="source-shot"><img src="${esc(source.screenshot_url)}" alt="Captured staffing source" /></div>` : ""}
      </article>
    `;
  }

  function field(label, value) {
    return `<div class="field"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`;
  }

  function summaryItem(label, value) {
    return `
      <div class="summary-item">
        <span class="check"></span>
        <div>
          <div class="label">${esc(label)}</div>
          <div class="item-title">${esc(value)}</div>
        </div>
      </div>
    `;
  }

  function cap(value) {
    const text = String(value || "");
    return text ? text.charAt(0).toUpperCase() + text.slice(1) : "";
  }

  function statusColor(status) {
    if (status === "recommended") return "green";
    if (status === "backup" || status === "ready") return "blue";
    if (status === "partial") return "amber";
    return "red";
  }

  function checkIcon() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5l4.2 4.2L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function sendIcon() {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 12L20 4l-4 16-4-7-8-1Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`;
  }
</script>
</body>
</html>
