<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CrewLoop — Dispatch dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F6F4EE;
    --panel:#FBFAF6;
    --ink:#161410;
    --ink-2:#3A372F;
    --muted:#7A766C;
    --line:rgba(22,20,16,0.10);
    --line-2:rgba(22,20,16,0.06);
    --accent:#3E7C4E;
    --accent-soft:#E6EFE5;
    --urgent:#C8482E;
    --urgent-soft:#F4E3DC;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Geist", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:"Instrument Serif", "Times New Roman", serif;font-weight:400;letter-spacing:-0.01em}
  .mono{font-family:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;border-bottom:1px solid var(--line);
    background:color-mix(in oklab, var(--bg) 88%, transparent);
    position:sticky;top:0;z-index:10;backdrop-filter:saturate(140%) blur(10px);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:500}
  .brand-mark{
    width:22px;height:22px;border-radius:6px;background:var(--ink);
    display:grid;place-items:center;
  }
  .brand b{font-size:16px;font-weight:500}
  .topbar .label{font-family:"Geist Mono",monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
  .topbar .right{display:flex;align-items:center;gap:14px}
  .refresh{
    font-family:"Geist Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:0.06em;
  }

  .layout{
    display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 57px);
  }
  @media (max-width:760px){ .layout{grid-template-columns:1fr} }

  .sidebar{
    border-right:1px solid var(--line);overflow:auto;background:var(--panel);
  }
  .sidebar-head{
    padding:18px 20px 12px;border-bottom:1px solid var(--line-2);
    display:flex;align-items:baseline;justify-content:space-between;
  }
  .sidebar-head h2{
    margin:0;font-family:"Instrument Serif",serif;font-weight:400;font-size:22px;letter-spacing:-0.01em;
  }
  .sidebar-head .count{font-family:"Geist Mono",monospace;font-size:11px;color:var(--muted)}
  .conv{
    display:grid;grid-template-columns:1fr auto;gap:6px 12px;
    padding:14px 20px;border-bottom:1px solid var(--line-2);cursor:pointer;
    transition:background .12s ease;
  }
  .conv:hover{background:#F0EDE3}
  .conv.active{background:#EDE9DC}
  .conv .name{font-weight:500;color:var(--ink);font-size:14px}
  .conv .time{font-family:"Geist Mono",monospace;font-size:11px;color:var(--muted);align-self:start}
  .conv .preview{
    grid-column:1 / -1;color:var(--ink-2);font-size:13px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .conv .meta-row{
    grid-column:1 / -1;display:flex;gap:8px;align-items:center;
    font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--muted);letter-spacing:0.04em;
  }
  .empty{padding:32px 20px;color:var(--muted);font-size:13.5px}

  .main{overflow:auto}
  .thread-head{
    padding:20px 28px;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;justify-content:space-between;gap:16px;
  }
  .thread-head h1{
    margin:0;font-family:"Instrument Serif",serif;font-weight:400;font-size:30px;letter-spacing:-0.015em;
  }
  .thread-head .sub{font-family:"Geist Mono",monospace;font-size:11.5px;color:var(--muted);letter-spacing:0.06em}

  .thread{padding:24px 28px;display:flex;flex-direction:column;gap:10px;max-width:780px}
  .row{display:flex;flex-direction:column}
  .row.out{align-items:flex-end}
  .row.in{align-items:flex-start}
  .bubble{
    max-width:78%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.45;
    white-space:pre-wrap;word-wrap:break-word;
  }
  .row.in .bubble{background:#F0EDE3;color:var(--ink);border-bottom-left-radius:6px}
  .row.out .bubble{background:var(--ink);color:#FBFAF6;border-bottom-right-radius:6px}
  .row .ts{
    font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--muted);
    margin:4px 6px 0;letter-spacing:0.04em;
  }

  .call{
    align-self:stretch;background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;margin:6px 0;
    display:grid;grid-template-columns:auto 1fr auto;gap:10px 14px;align-items:center;
  }
  .call .icon{
    width:30px;height:30px;border-radius:999px;background:var(--accent-soft);color:var(--accent);
    display:grid;place-items:center;font-family:"Geist Mono",monospace;font-size:12px;
  }
  .call .title{font-size:13.5px;color:var(--ink);font-weight:500}
  .call .meta{font-family:"Geist Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:0.04em}
  .call .summary{grid-column:2 / -1;font-size:13px;color:var(--ink-2);margin-top:2px}
  .call .transcript{
    grid-column:1 / -1;margin-top:8px;border-top:1px solid var(--line-2);padding-top:10px;
    display:flex;flex-direction:column;gap:6px;
  }
  .call .transcript .t-row{font-size:13px}
  .call .transcript .role{
    font-family:"Geist Mono",monospace;font-size:10.5px;color:var(--muted);letter-spacing:0.06em;
    text-transform:uppercase;margin-right:8px;
  }

  .placeholder{
    height:100%;display:grid;place-items:center;color:var(--muted);
    font-family:"Instrument Serif",serif;font-size:24px;letter-spacing:-0.01em;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 7a5 5 0 1 1 8.5 3.5" stroke="#FBFAF6" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M10.5 7.5L10.5 10.5L7.5 10.5" stroke="#FBFAF6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <b>CrewLoop</b>
    <span class="label">· Dashboard</span>
  </div>
  <div class="right">
    <span class="refresh" id="refresh">refreshing…</span>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-head">
      <h2>Conversations</h2>
      <span class="count" id="conv-count">0</span>
    </div>
    <div id="conv-list"></div>
  </aside>

  <main class="main">
    <div id="thread-root">
      <div class="placeholder">Select a conversation</div>
    </div>
  </main>
</div>

<script>
  const fmt = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    return d.toLocaleDateString([], { month: "short", day: "numeric" }) +
      " · " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  };

  let selectedPhone = null;

  async function loadConversations() {
    const r = await fetch("/api/conversations");
    if (!r.ok) throw new Error("conv list failed");
    const { items } = await r.json();
    const list = document.getElementById("conv-list");
    document.getElementById("conv-count").textContent = items.length;
    if (!items.length) {
      list.innerHTML = '<div class="empty">No conversations yet. Send an SMS via <span class="mono">POST /api/sms/send</span> to start one.</div>';
      return;
    }
    list.innerHTML = items.map(c => {
      const preview = c.last_message ? c.last_message.replace(/</g, "&lt;") : "(no messages)";
      const isOut = c.last_direction === "outbound";
      return `
        <div class="conv ${selectedPhone === c.phone ? "active" : ""}" data-phone="${c.phone}">
          <div class="name">${c.display_name || c.phone}</div>
          <div class="time">${fmt(c.last_message_at)}</div>
          <div class="preview">${isOut ? "→ " : "← "}${preview}</div>
          <div class="meta-row">
            <span>${c.message_count} msg</span>
            ${c.call_count ? `<span>· ${c.call_count} call${c.call_count === 1 ? "" : "s"}</span>` : ""}
          </div>
        </div>`;
    }).join("");
    list.querySelectorAll(".conv").forEach(el => {
      el.addEventListener("click", () => {
        selectedPhone = el.dataset.phone;
        loadConversations();
        loadThread(selectedPhone);
      });
    });
  }

  async function loadThread(phone) {
    const root = document.getElementById("thread-root");
    root.innerHTML = '<div class="placeholder">Loading…</div>';
    const r = await fetch("/api/conversations/" + encodeURIComponent(phone));
    if (!r.ok) {
      root.innerHTML = '<div class="placeholder">Conversation not found</div>';
      return;
    }
    const { conversation, messages, calls } = await r.json();

    // Merge messages + calls into a single chronological stream.
    const items = [
      ...messages.map(m => ({ kind: "msg", at: m.created_at, data: m })),
      ...calls.map(k => ({ kind: "call", at: k.started_at, data: k })),
    ].sort((a, b) => new Date(a.at) - new Date(b.at));

    const head = `
      <div class="thread-head">
        <div>
          <h1>${conversation.display_name || conversation.phone}</h1>
          <div class="sub">${conversation.phone} · ${messages.length} message${messages.length === 1 ? "" : "s"}${calls.length ? ` · ${calls.length} call${calls.length === 1 ? "" : "s"}` : ""}</div>
        </div>
      </div>`;

    const body = items.length === 0
      ? '<div class="placeholder" style="padding:60px 0">No messages yet</div>'
      : `<div class="thread">${items.map(renderItem).join("")}</div>`;

    root.innerHTML = head + body;
  }

  function renderItem(it) {
    if (it.kind === "msg") {
      const m = it.data;
      const dir = m.direction === "outbound" ? "out" : "in";
      const safe = (m.body || "").replace(/</g, "&lt;");
      return `
        <div class="row ${dir}">
          <div class="bubble">${safe}</div>
          <div class="ts">${fmt(m.created_at)}${m.from_number ? " · " + m.from_number : ""}</div>
        </div>`;
    }
    if (it.kind === "call") {
      const c = it.data;
      const dur = c.duration_seconds ? `${Math.round(c.duration_seconds)}s` : "—";
      const transcript = Array.isArray(c.transcript) ? c.transcript : null;
      return `
        <div class="call">
          <div class="icon">☎</div>
          <div class="title">${c.direction === "outbound" ? "Outbound call" : "Inbound call"} · ${c.to_number}</div>
          <div class="meta">${fmt(c.started_at)} · ${dur}${c.disconnection_reason ? " · " + c.disconnection_reason : ""}</div>
          ${c.summary ? `<div class="summary">${c.summary.replace(/</g, "&lt;")}</div>` : ""}
          ${transcript && transcript.length ? `
            <div class="transcript">
              ${transcript.map(t => `<div class="t-row"><span class="role">${(t.role || "").replace(/</g, "&lt;")}</span>${(t.content || "").replace(/</g, "&lt;")}</div>`).join("")}
            </div>` : ""}
        </div>`;
    }
    return "";
  }

  async function tick() {
    const ref = document.getElementById("refresh");
    ref.textContent = "refreshing…";
    try {
      await loadConversations();
      if (selectedPhone) await loadThread(selectedPhone);
      ref.textContent = "updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    } catch (e) {
      ref.textContent = "offline";
    }
  }

  tick();
  setInterval(tick, 5000);
</script>

</body>
</html>
